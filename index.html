<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpportunityRadar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0f172a;
color:#e5e7eb;
font-family:Arial;
margin:0;
}

header{
background:#111827;
padding:25px;
border-bottom:1px solid #334155;
}

h1{
margin:0;
font-size:28px;
}

.container{
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
border:1px solid #334155;
}

.metric{
font-size:20px;
font-weight:bold;
}

.tag{
display:inline-block;
background:#22c55e;
color:#052e16;
padding:5px 10px;
border-radius:20px;
font-size:12px;
margin-top:10px;
}

button{
background:#38bdf8;
border:none;
padding:10px 14px;
border-radius:8px;
margin-top:15px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>OpportunityRadar</h1>
<p>Private opportunity dashboard</p>
</header>

<div class="container">

<div class="card">

<h2>Hotel Redevelopment Opportunity</h2>

<div class="tag">HIGH PRIORITY</div>

<br><br>

<div class="metric">Score: 92</div>
<div class="metric">Projected Profit: $1,250,000</div>
<div class="metric">Spread: 18%</div>
<div class="metric">Confidence: High</div>

<button>Open OM</button>

</div>

<div class="card">

<h2>Pipeline</h2>

<p>This is the starter OpportunityRadar dashboard.</p>

</div>

</div>

</body>
</html>
