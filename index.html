<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OpportunityRadar</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

.container{
    width:1100px;
    margin:auto;
}

.header{
    padding:30px 0;
}

.card{
    background:#1e293b;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
}

.value{
    color:#22c55e;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>OpportunityRadar</h1>
<p>Private opportunity dashboard</p>
</div>

<div id="pipeline"></div>

</div>

<script>

async function loadOpportunities(){

let response = await fetch("opportunities.json");
let data = await response.json();

let container = document.getElementById("pipeline");

container.innerHTML = "";

data.forEach(opportunity => {

let value = opportunity.value
? "$" + opportunity.value.toLocaleString()
: "Not listed";

let card = `
<div class="card">

<h2>${opportunity.title}</h2>

<p><b>Solicitation:</b> ${opportunity.solicitation}</p>

<p><b>State:</b> ${opportunity.state}</p>

<p><b>NAICS:</b> ${opportunity.naics}</p>

<p class="value"><b>Estimated Value:</b> ${value}</p>

</div>
`;

container.innerHTML += card;

});

}

loadOpportunities();

</script>

</body>
</html>
